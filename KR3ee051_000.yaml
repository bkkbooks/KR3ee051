body:
  text: 正文先師祕訣生死血道訣楊成博遺傳點脈祕書師曰要害生死血道要明春夏秋冬四季十二時辰方可次斷生死傷心之事不可用之出外偶遇惡人此比功夫不可忍之無此比惡何必傷人之命此比手法出在三尖之法何為三尖之法虎尖掌尖肩尖是也定要子午分明百發百中賢徒習成此比手法之日尊師口訣分明此比功夫百發百中難曉此比手法至善而取之爾若強取不能成功矣出此比手法次要虎尖點掌尖落掌尖落肩尖進切不可亂出手傷人之命也如若發莫忘先師之付託現看句不明再看四圍圖式便能明曉須言叮囑之語而亦自己良心此書若傳好人固可按部醫人如歹人得之則禍害不淺切不可亂人矣師曰人有一十八穴大五十四穴小天地人和四大穴此比方乃傷人之命也何為小穴手足四肢是內外筋骨共成七十二穴藥有七十二方習煉成功矣妙藥可以活之倘若出外不可傷人須要時存善念見事多謀為師之言須要緊記看症口訣第一看用手拈起眼皮看他瞳人動第二看嘴角人中血道紅黃尚可若白紫黑色難醫第三看太陰太陽用手按住內跳動者可醫心中亦跳動可此比五形中有一血穴生動可救矣無生動的看外形用手抑頭一二三四關看一關活動者即用通關散吹入鼻內手指拍動照三關一把即可用雄雞一隻連皮破腹入麝香三分趁滾對臍敷之須看面色紅轉赤有救白轉黑即死形色若不好用難對大參六分再用回生丹服之候之三筒煙久候內心響然後以手推之分為男左女右女人推之肚膀男推之丹田不鬆手如此三把看其氣接再看傷在何處用生薑一片蔥頭擦傷處用勞宮穴按之其傷即散然後用藥調治凡傷穴道七吼不治大小便長流腎子脫落不治腰對節斷不治瞳人兩便破不治咽喉見管不治落下二心口撞上心不治受傷倒地正心口吐汁不治用花針插入鼻尖上二三分取血紅有救出血轉白黃紅不可治也如看假死者咽喉紅動心掙起用吹關散吹之立效關上一把提起即打不打足之情恐傷一命折壽三年四季口訣血走十二時藥有十二方治四季用藥照傷處而治改時不該藥後用全身丸子時血行道左咽喉名為仙鵝取血穴傷者七十二日而死服此方全愈麝香二分丁香川芎鬱金陳皮血竭桔梗三七地龍生地紅花羌活乳香橘紅古錢醋煅七次以上藥各二錢共為細末酒調三錢半服半即愈丑時血行道左筋名為盤元穴傷重者三七九日而死服後方愈虎骨二錢碎補白芷香附小茴檳榔三稜莪朮澤瀉紅花歸尾乳香青皮豬苓沒藥以上各一錢清水煎服寅時血行道右筋名為肚角穴傷重者一日一時輕者周年半載而死服後方即愈續斷二錢生地羌活乳香川芎蘇木澤蘭檳榔白芷大茴赤芍丹皮歸尾獨活紅花加桃仁以上藥各一錢水煎服卯時血行道右血腕名為隙𮔳穴傷者寒熱往來咳嗽吐血半年死服後方愈麻黃二錢京芥莪朮蒲黃紫草桃仁枳殼宜茶三稜三七鬱金紅花乳香桑皮赤芍陳皮木香川芎生地各一錢酒煎沖童便服辰時血行道左比雙燕入穴傷重者四肢無力黃皮瘦弱吐血主五日半而死服後方全愈澤瀉二錢紅花桃仁茯苓澤蘭陳皮柴胡桂枝續斷羌活桑皮甘草各一錢加生薑三片酒煎以上藥各一錢此乃鳳羽之穴離腰之邊但傷之如不至死者可能治亦宜早治四九之患也大寒小寒碎補二錢川烏一錢獨活一錢乳香二錢羌活一錢無名異一錢赤芍二錢肉蓯蓉一錢紅花一錢卷柏一錢草烏一錢秦艽一錢半田七一錢另包土鱉子一錢半千年健一錢沒藥一錢半加首烏一錢酒水煎空心服此穴有傷不能知也自問如起拳棍不能傷此穴眼系背花年少不防此症可小可大七情之傷亦難治也此方十二條偶有求方者醫治將三十四方發藥無有不對之理倘傷穴情用藥百發百中看者亦要自己習練看傷神色變動亦要談他生死之醫治一年四季月日時刻皆有定旨小心看習自然知長久之命也終身結脈法仍系穴脈之出一二明白要習師出身教習此法倘不知此雖勇如猛虎無濟也七香跌打丸烏狗腳爪四隻紅花二錢木瓜一錢田七二錢沉香三錢金邊湖蜞五條枳殼二錢珍珠一錢象皮一錢三稜一錢鳳凰根二錢川芎一錢青皮二錢沙參二錢降香一錢金邊土鱉二錢膽星一錢無名異醋製二錢大王四錢自然銅醋製一錢木香一錢檀香一錢桃仁三錢地龍一錢歸尾三錢焦蠍子二隻牛膝一錢藿香一錢桂枝一錢莪朮二錢虎骨二錢赤芍一錢鬱金一錢生地一錢蘇木二錢血竭二錢麝香五分乳香二錢去油共為細末用蜜為丸每重二錢五分曬乾只得一錢八分此七香跌打丸共三十八味和前二十四穴之情訣不但日久之症即能成效如傷輕者用一丸傷重者二丸作一服必能全愈跌打總方川連一錢紅花一錢血珀八分羌王一錢田七一錢自然銅一錢醋炒歸尾三錢沒藥七分血竭一錢鬱金一錢人中白一錢另包沖服生地二錢乳香六分玄胡一錢中王四分沉香八分熊膽三分珍珠七分莪朮二錢三稜一錢桂枝一錢大王一錢半酒水各半煎服用童便加沖落藥更妙回生丹將藥吹入鼻內一時回生男左女右即吹即愈生芷生半夏生皂角生蒲英北細辛麝香冰片以上共為細末貯用倘遇跌倒傷臥地不知人事用此藥遂醒然後向症發藥無誤也跌打吊瘀煎水洗方防風三錢當歸三錢羌活三錢京芥三錢苦參五錢丹皮五錢鶴蝨五錢虎骨三錢川椒五錢蘄艾五錢黃柏三錢羌王五錢共為粗末分兩包煎水洗
